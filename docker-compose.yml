services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5000"  # Đổi từ 5000:5000 thành 5001:5000
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://admin:123456@mongo:27017/financeapp?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key
      - PORT=5000
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:6.0
    container_name: finance-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123456

  redis:
    image: redis:7.0-alpine
    container_name: finance-redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
